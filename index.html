<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rifa Korg Kross 2</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(60px,1fr));
gap:10px;
justify-content:center;
margin-top:30px;
max-width:500px;
margin-left:auto;
margin-right:auto;
}

.num{
padding:20px;
font-size:20px;
background:#2ecc71; 
cursor:pointer;
font-weight:bold;
}

.num:hover{
background:#1565c0;
}

</style>

</head>

<body>

<h1>🎹 Rifa Korg Kross 2</h1>
<img src="KROSS261.png" width="350">
<p>$500 por número</p>
 <p>Sorteo: 30 de junio</p>
<p id="tiempo"></p> 
<p id="contador"></p>
<div style="width:300px;height:20px;background:#444;margin:auto;border-radius:10px;">
  <div id="barra" style="height:20px;background:#2ecc71;width:0%;border-radius:10px;"></div>
</div>  
<p>Selecciona tu número para apartarlo</p>

<div class="grid" id="numeros"></div>

<script>

let contenedor=document.getElementById("numeros");
let vendidos = [5,12,18];
 let progreso = (vendidos.length / 70) * 100;
document.getElementById("barra").style.width = progreso + "%"; 
document.getElementById("contador").innerText =
vendidos.length + " de 70 números vendidos";  
for(let i=1;i<=70;i++){

let boton=document.createElement("div");

boton.className="num";

boton.innerText=i;
if(vendidos.includes(i)){
  boton.style.background="black";
  boton.style.cursor="not-allowed";
  boton.innerText=i + "\nVENDIDO";
  boton.style.fontSize="12px";
  boton.onclick=null;
}
boton.onclick=()=>{

let telefono="3312337816";

let mensaje=`Hola quiero apartar el número ${i} de la rifa del Kross 2`;

window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`);

};

contenedor.appendChild(boton);

}
let fecha = new Date("2026-06-30 20:00:00").getTime();

setInterval(function(){

let ahora = new Date().getTime();

let diferencia = fecha - ahora;

let dias = Math.floor(diferencia / (1000*60*60*24));

let horas = Math.floor((diferencia % (1000*60*60*24)) / (1000*60*60));

let minutos = Math.floor((diferencia % (1000*60*60)) / (1000*60));

document.getElementById("tiempo").innerText =
"Sorteo en: " + dias + " días " + horas + "h " + minutos + "m";

},1000);
</script>
<a href="https://wa.me/5213312337816"
style="position:fixed;bottom:20px;right:20px;background:#25D366;color:white;padding:15px;border-radius:50%;text-decoration:none;font-size:24px;">
💬
</a>
</body>
</html>
